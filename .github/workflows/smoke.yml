name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build deps
        run: pip install setuptools wheel Cython picobuild

      - name: Install package (portable, no native march)
        env:
          CPY_NATIVE: "0"
        run: pip install .

      - name: Import smoke
        run: |
          python -c "from cypy.hot import bytes_len, dict_get, str_len; assert bytes_len(b'ok') == 2; print('ok', __import__('cypy').__version__)"

      - name: Export / COMPAT_MAP gates
        run: python scripts/check_exports.py

      - name: Grade trackers (53/53 A)
        run: python scripts/grade_trackers.py

      - name: Run Python examples
        run: |
          set -e
          for f in examples/py*.py examples/wrap_ansi.py; do
            echo "== $f =="
            python "$f"
          done
