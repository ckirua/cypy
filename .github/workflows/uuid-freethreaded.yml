name: UUID free-threaded compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  uuid-freethreaded:
    name: CPython 3.14t GIL compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up CPython 3.14t
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"

      - name: Install native build dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libssl-dev

      - name: Create isolated build environment
        run: |
          python -m venv .venv-uuid-freethreaded
          .venv-uuid-freethreaded/bin/python -m pip install --disable-pip-version-check setuptools Cython

      - name: Build only the UUID extension
        run: .venv-uuid-freethreaded/bin/python scripts/ci/build_uuid_freethreaded.py

      - name: Verify GIL compatibility and UUID APIs
        env:
          PYTHONPATH: src
        run: |
          .venv-uuid-freethreaded/bin/python - <<'PY'
          import sys
          import types
          import uuid
          from pathlib import Path

          assert not sys._is_gil_enabled(), "CPython 3.14t did not start with the GIL disabled"

          # This focused job builds only cypy.uuid; provide its parent package
          # without importing the unrelated prebuilt cypy extension set.
          package = types.ModuleType("cypy")
          package.__path__ = [str(Path("src/cypy").resolve())]
          sys.modules["cypy"] = package

          from cypy.uuid import UUID, uuid4, uuid4_bytes

          assert sys._is_gil_enabled(), (
              "cypy.uuid._uuid falsely loaded as native no-GIL compatible"
          )
          assert uuid.UUID in UUID.__mro__

          value = uuid4()
          raw = uuid4_bytes()
          assert isinstance(value, UUID)
          assert isinstance(value, uuid.UUID)
          assert value.version == 4
          assert value.variant == uuid.RFC_4122
          assert len(raw) == 16
          assert raw[6] >> 4 == 4
          assert raw[8] & 0xC0 == 0x80

          reconstructed = UUID(raw)
          assert reconstructed.version == 4
          assert reconstructed.variant == uuid.RFC_4122
          PY
